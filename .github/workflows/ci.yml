name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --python ${{ matrix.python-version }}
      - run: uv run pytest -q

  lint:
    name: lint & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      # --all-extras so mypy can resolve the optional anthropic/mcp imports.
      - run: uv sync --all-extras
      # NOTE: ruff and mypy --strict have not been run locally (no toolchain in
      # the dev sandbox). They are advisory until verified green on a real run,
      # then remove `continue-on-error` to make them blocking gates.
      - name: ruff
        run: uv run ruff check src tests
        continue-on-error: true
      - name: mypy (strict)
        run: uv run mypy
        continue-on-error: true
