name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest -q

  lint:
    name: lint & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      # NOTE: ruff and mypy --strict have not been run locally (no toolchain in
      # the dev sandbox). They are advisory until verified green on a real run,
      # then remove `continue-on-error` to make them blocking gates.
      - name: ruff
        run: ruff check src tests
        continue-on-error: true
      - name: mypy (strict)
        run: mypy
        continue-on-error: true
