name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Needed for `mkdocs gh-deploy` to push the built site to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DISABLE_MKDOCS_2_WARNING: "true"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --group docs
      # Builds and publishes to the gh-pages branch. Enable GitHub Pages
      # (Settings -> Pages -> Deploy from a branch -> gh-pages) to serve it.
      - run: uv run mkdocs gh-deploy --force --no-history
